name: Deploy to Cloudflare Pages

on:
  # Auto-deploy on every push to main.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One concurrent deploy; newer runs cancel in-flight ones.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cloudflare Pages serves from the root domain, so build with base "/".
      - run: npm run build
        env:
          DEPLOY_BASE: "/"
      # NOTE: the Cloudflare Pages project + custom-domain binding are created by
      # a human (one-time) per the `cloudflare-pages-deploy` skill. This workflow
      # only needs CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID repo secrets and
      # a Pages project named `official-website`.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=official-website --branch=main

      # Catch "deployed but production still serves the old build" (a CF Pages
      # promotion/cache glitch we hit once): assert the live prod alias serves the
      # exact bundle we just built; retry for propagation, fail (red CI) if it never does.
      - name: Verify production serves the new build
        run: |
          HASH=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          echo "expecting prod to serve bundle: $HASH"
          for i in $(seq 1 12); do
            LIVE=$(curl -s "https://official-website-bcm.pages.dev/?cb=$RANDOM$i" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            echo "attempt $i: prod serves $LIVE"
            [ "$LIVE" = "$HASH" ] && { echo "✓ production is serving the new build"; exit 0; }
            sleep 15
          done
          echo "✗ production NOT serving the new build ~3min after deploy — stale prod alias / cache"; exit 1
